{% extends "base.html" %}

{% block title %}{{ _('login') }}{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="col-md-5">
    <div class="card card-premium p-4">
      <div class="text-center mb-4">
        <i class="fa-solid fa-droplet text-success fs-1 mb-2"></i>
        <h4 class="fw-bold text-success mb-1">{{ clinic_name }}</h4>
        <p class="text-muted small">{{ _('login_sub_title') }}</p>
      </div>

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">{{ _('username') }}</label>
          <div class="input-group">
            <span class="input-group-text border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
            <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="..." required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">{{ _('password') }}</label>
          <div class="input-group">
            <span class="input-group-text border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="..." required>
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100 py-2 fs-5 fw-bold rounded-3">
          <i class="fa-solid fa-right-to-bracket me-2"></i> {{ _('login_btn') }}
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
